<!-- ============ Firebase 초기화 + 기존 mock API 호환 어댑터 ============ -->
<script>
(function () {
  const firebaseConfig = {
    apiKey: "AIzaSyBVk0Wii8QV7fHk1VfgIhaXr5p0tubQ6iU",
    authDomain: "student-achievement-syst-c94fd.firebaseapp.com",
    projectId: "student-achievement-syst-c94fd",
    storageBucket: "student-achievement-syst-c94fd.firebasestorage.app",
    messagingSenderId: "285853934272",
    appId: "1:285853934272:web:d70c786516490a6d8e8325"
  };

  // Firebase 앱 초기화
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();

  // 오프라인 캐시 활성화 (탭 간 동기화 지원) — 실패해도 앱은 정상 동작
  try {
    db.enablePersistence({ synchronizeTabs: true }).catch(err => {
      console.warn('[Firestore] persistence not enabled:', err && err.code);
    });
  } catch (e) { /* no-op */ }

  // ========= 기존 mock API 와 동일하게 전역 노출 =========
  // 원본 코드에서 다음 3개 전역만 참조함:
  //   window.db, window.FieldValue, window.firebase.firestore.Timestamp
  // 모두 compat SDK 가 그대로 제공하므로 추가 어댑터가 필요 없음.
  window.db = db;
  window.FieldValue = firebase.firestore.FieldValue;
  // window.firebase 는 compat SDK 가 이미 노출하고 있음 (Timestamp 포함)

  // ========= localStorage → Firestore 마이그레이션 유틸 =========
  // 원본 mock DB 의 저장 키 ('myeongin_db_v3') 를 그대로 읽어와서 Firestore 로 옮김
  const OLD_STORAGE_KEY = 'myeongin_db_v3';
  const OLD_TICK_KEY    = 'myeongin_db_tick_v3';

  // mock 이 저장하던 {__t:'ts', iso} / {__t:'server_ts'} 형태를 Firestore 타입으로 복원
  function reviveValue(v) {
    if (v && typeof v === 'object' && v.__t === 'ts'         && v.iso) {
      return firebase.firestore.Timestamp.fromDate(new Date(v.iso));
    }
    if (v && typeof v === 'object' && v.__t === 'server_ts') {
      return firebase.firestore.Timestamp.fromDate(new Date());
    }
    if (Array.isArray(v)) return v.map(reviveValue);
    if (v && typeof v === 'object') {
      const o = {};
      for (const k in v) o[k] = reviveValue(v[k]);
      return o;
    }
    return v;
  }

  window.__migration = {
    hasLocalData() {
      const raw = localStorage.getItem(OLD_STORAGE_KEY);
      if (!raw) return { has:false };
      try {
        const store = JSON.parse(raw);
        const summary = {};
        let total = 0;
        for (const c in store) {
          const n = Object.keys(store[c] || {}).length;
          summary[c] = n; total += n;
        }
        return { has: total>0, total, summary, raw };
      } catch (e) { return { has:false, error: String(e) }; }
    },

    // mode: 'merge' (기본) — 같은 ID 가 있으면 필드 병합
    //       'overwrite'              — 완전 덮어쓰기
    //       'skip'                   — 이미 존재하면 건너뛰기
    async migrate(mode, onProgress) {
      const info = window.__migration.hasLocalData();
      if (!info.has) throw new Error('이전할 localStorage 데이터가 없습니다.');
      const store = JSON.parse(info.raw);
      let done = 0, skipped = 0;

      for (const collName in store) {
        const coll = store[collName] || {};
        const ids = Object.keys(coll);

        // 'skip' 모드: 기존 문서 존재 여부 사전 조회
        let existingIds = new Set();
        if (mode === 'skip') {
          // 다량의 문서 get 비용을 줄이기 위해 개별 get 사용 (학급 단위 규모라 무리 없음)
          for (const id of ids) {
            try {
              const snap = await db.collection(collName).doc(id).get();
              if (snap.exists) existingIds.add(id);
            } catch(e) { /* ignore */ }
          }
        }

        // 배치는 최대 500 작업. 안전하게 400 단위로 잘라 커밋
        for (let i = 0; i < ids.length; i += 400) {
          const batch = db.batch();
          const slice = ids.slice(i, i + 400);
          let opsInBatch = 0;

          for (const id of slice) {
            if (mode === 'skip' && existingIds.has(id)) { skipped++; continue; }
            const data = reviveValue(coll[id]);
            const ref = db.collection(collName).doc(id);
            if (mode === 'merge') {
              batch.set(ref, data, { merge: true });
            } else {
              // 'overwrite' 또는 'skip' 의 신규 추가
              batch.set(ref, data);
            }
            opsInBatch++;
          }

          if (opsInBatch > 0) await batch.commit();
          done += opsInBatch;
          if (onProgress) onProgress({ collection: collName, done, skipped, total: info.total });
        }
      }
      return { done, skipped, total: info.total };
    },

    // 마이그레이션 후 안전하게 로컬 키 비우기 (선택)
    clearLocal() {
      localStorage.removeItem(OLD_STORAGE_KEY);
      localStorage.removeItem(OLD_TICK_KEY);
    }
  };

  console.log('%c[Firestore] 실시간 백엔드 연결됨', 'color:#0ea5e9;font-weight:bold');
})();

const normalizeGoal = g => {
  if (!g) return { text:'', dataType:'', unit:'', customUnit:'', targetValue:0, trendDirection:'up' };
  if (typeof g === 'string') return { text:g, dataType:'', unit:'', customUnit:'', targetValue:0, trendDirection:'up' };
  return {
    text: g.text || '',
    dataType: g.dataType || '',
    unit: g.unit || '',
    customUnit: g.customUnit || '',
    targetValue: Number(g.targetValue) || 0,
    trendDirection: g.trendDirection === 'down' ? 'down' : 'up',
  };
};
const goalUnitLabel = g => {
  const n = normalizeGoal(g);
  return n.unit === CUSTOM_UNIT ? (n.customUnit || '') : (n.unit || '');
};

  const n = normalizeGoal(g);

  const u = goalUnitLabel(g);
  if (!u) return false;
  if (n.dataType === 'frequency' && (!n.targetValue || n.targetValue <= 0)) return false;
  return true;
};

function NumberStepper({ value, onChange, unit, min=0, max=99999, step=1, color, compact=false }) {
  const v = Number.isFinite(value) ? value : 0;
  const dec = () => onChange(Math.max(min, +(v - step).toFixed(2)));
  const inc = () => onChange(Math.min(max, +(v + step).toFixed(2)));
  const set = (s) => {
    if (s === '' || s === '-') { onChange(0); return; }
    const n = Number(s);
    if (Number.isFinite(n)) onChange(Math.max(min, Math.min(max, n)));
  };
  const btnW    = compact ? 'w-9'  : 'w-12';
  const btnText = compact ? 'text-xl' : 'text-2xl';
  const numText = compact ? 'text-base' : 'text-2xl';
  const unitMin = compact ? 'min-w-[2.25rem]' : 'min-w-[3rem]';
  const unitPad = compact ? 'px-1.5' : 'px-3';
  const gap     = compact ? 'gap-1.5' : 'gap-2';

  return (
    <div className={`flex items-stretch ${gap} h-12`}>
      <button type="button" onClick={dec}
        className={`stepper-btn shrink-0 ${btnW} h-full rounded-2xl border-2 border-pink-200 bg-white ${btnText} font-bold text-slate-700 hover:bg-pink-50 active:scale-95 flex items-center justify-center leading-none`}>−</button>
      <div className="flex-1 min-w-0 h-full flex items-stretch rounded-2xl border-2 border-pink-200 bg-white overflow-hidden">
        <input type="number" inputMode="decimal"
          className={`flex-1 min-w-0 w-full h-full px-1.5 ${numText} font-bold text-slate-800 tabular-nums text-center focus:outline-none bg-transparent`}
          value={v} onChange={e=>set(e.target.value)} min={min} max={max} step={step}/>
        {unit && (
          <div className={`flex items-center justify-center ${unitPad} ${unitMin} text-xs font-bold ${color||'text-pink-600'} bg-pink-50 border-l-2 border-pink-100 shrink-0`}>
            {unit}
          </div>
        )}
      </div>
      <button type="button" onClick={inc}
        className={`stepper-btn shrink-0 ${btnW} h-full rounded-2xl border-2 border-pink-200 bg-white ${btnText} font-bold text-slate-700 hover:bg-pink-50 active:scale-95 flex items-center justify-center leading-none`}>+</button>
    </div>
  );
}

function DateRangePicker({ startDate, endDate, onChange }) {
  const today = toDateInputValue(new Date());
  const sVal = toDateInputValue(startDate);
  const eVal = toDateInputValue(endDate);
  return (
    <div className="flex items-center gap-1.5 text-xs">
      <input
        type="date"
        className="px-2 py-1.5 rounded-xl border-2 border-pink-200 text-xs bg-white focus:outline-none focus:border-pink-400"
        value={sVal} max={eVal}
        onChange={e=>{ if(!e.target.value) return; onChange(parseDateInputValue(e.target.value), endDate); }}
      />
      <span className="text-slate-400">~</span>
      <input
        type="date"
        className="px-2 py-1.5 rounded-xl border-2 border-pink-200 text-xs bg-white focus:outline-none focus:border-pink-400"
        value={eVal} min={sVal} max={today}
        onChange={e=>{ if(!e.target.value) return; onChange(startDate, parseDateInputValue(e.target.value)); }}
      />
    </div>
  );
}

function StudentLogin({ onLogin, onBack }) {
  const [students, setStudents] = useState([]);
  const [picked, setPicked] = useState(null);
  const [pin, setPin] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [needAvatar, setNeedAvatar] = useState(false);
  useEffect(() => {
    const unsub = db.collection('students').onSnapshot(qs => {
      const arr = qs.docs.map(d=>d.data());
      arr.sort((a,b)=>a.number-b.number);
      setStudents(arr);
    });
    return unsub;
  }, []);
  const submit = async () => {
    setErr('');
    if (!picked || !pin) { setErr('PIN을 입력해 주세요.'); return; }
    setLoading(true);
    try {
      const ref = db.collection('students').doc(picked.id);
      const snap = await ref.get();
      if (!snap.exists) { setErr('학생 정보를 찾을 수 없어요.'); setLoading(false); return; }
      const data = snap.data();
      if ((data.pin || DEFAULT_PIN) !== pin) { setErr('PIN이 일치하지 않아요.'); setLoading(false); return; }
      await ref.update({ lastLoginAt: FieldValue.serverTimestamp() });
      if (!data.avatar) { setNeedAvatar(true); setLoading(false); return; }
      onLogin({ id: picked.id, number: picked.number, name: data.name, avatar: data.avatar });
    } catch(e) { console.error(e); setErr('접속 실패.'); }
    finally { setLoading(false); }
  };
  const chooseAvatar = async (emoji) => {
    await db.collection('students').doc(picked.id).update({ avatar: emoji, updatedAt: FieldValue.serverTimestamp() });
    onLogin({ id: picked.id, number: picked.number, name: picked.name, avatar: emoji });
  };
  if (needAvatar) {
    return (
      <div className="min-h-screen p-4 flex items-center justify-center">
        <div className="w-full max-w-md">
          <div className="bg-white rounded-3xl border-2 border-pink-100 p-6 shadow-sm pop-in">
            <div className="text-center mb-4">
              <div className="text-5xl mb-2">✨</div>
              <h2 className="text-xl font-bold text-slate-800">반가워요, {picked.name}!</h2>
              <p className="text-sm text-slate-500 mt-1">내 프로필 동물을 골라 주세요 🐾</p>
            </div>
            <div className="grid grid-cols-4 gap-3">
              {ANIMAL_AVATARS.map(a => (
                <button key={a} onClick={()=>chooseAvatar(a)}
                  className="aspect-square rounded-2xl bg-gradient-to-br from-pink-50 to-sky-50 border-2 border-transparent hover:border-pink-300 hover:scale-110 transition text-4xl flex items-center justify-center">
                  {a}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }
  if (picked) {
    return (
      <div className="min-h-screen p-4 flex items-center justify-center">
        <div className="w-full max-w-md">
          <button onClick={()=>{setPicked(null);setPin('');setErr('');}} className="text-sm text-slate-500 mb-3">← 다시 고르기</button>
          <div className="bg-white rounded-3xl border-2 border-pink-100 p-6 shadow-sm pop-in">
            <div className="text-center mb-5">
              <div className="text-6xl mb-2">{picked.avatar || '🐣'}</div>
              <div className="text-xl font-bold text-slate-800">{picked.name}</div>
              <div className="text-xs text-slate-500 mt-0.5">{picked.number}번</div>
            </div>
            <Field label="PIN 번호 (처음에는 0000)">
              <input className="input" type="password" inputMode="numeric" maxLength="6" autoFocus
                value={pin} onChange={e=>setPin(e.target.value)} placeholder="0000"
                onKeyDown={e=>e.key==='Enter'&&submit()}/>
            </Field>
            {err && <p className="mt-3 text-sm text-rose-600">{err}</p>}
            <button onClick={submit} disabled={loading}
              className="mt-5 w-full bg-pink-400 hover:bg-pink-500 disabled:bg-slate-300 text-white font-bold py-3 rounded-2xl">
              {loading?'확인 중…':'들어가기 🌸'}
            </button>
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="min-h-screen p-4">
      <div className="max-w-3xl mx-auto">
        <button onClick={onBack} className="text-sm text-slate-500 mb-3">← 처음으로</button>
        <div className="text-center mb-5">
          <h2 className="text-2xl font-bold text-slate-800">우리반 친구들</h2>
          <p className="text-sm text-slate-500 mt-1">내 이름과 동물 친구를 콕! 눌러 주세요</p>
        </div>
        {students.length === 0 ? (
          <div className="bg-white rounded-3xl border-2 border-pink-100 p-10 text-center">
            <div className="text-5xl mb-3">🌷</div>
            <p className="text-slate-500 text-sm">아직 등록된 학생이 없어요.<br/>선생님께 요청해 주세요.</p>
          </div>
        ) : (
          <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
            {students.map(s => (
              <button key={s.id} onClick={()=>setPicked(s)}
                className="bg-white border-2 border-pink-100 rounded-3xl p-3 hover:border-pink-300 hover:scale-105 transition shadow-sm">
                <div className="aspect-square rounded-2xl bg-gradient-to-br from-pink-50 via-amber-50 to-sky-50 flex items-center justify-center text-5xl mb-2">
                  {s.avatar || '🐣'}
                </div>
                <div className="text-xs text-slate-400 text-center">{s.number}번</div>
                <div className="text-sm font-bold text-slate-800 text-center truncate">{s.name}</div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function PinChangeModal({ student, studentDoc, onClose }) {
  const [cur, setCur] = useState('');
  const [n1, setN1] = useState('');
  const [n2, setN2] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);
  const submit = async () => {
    setErr('');
    if (cur !== (studentDoc?.pin || DEFAULT_PIN)) { setErr('지금 PIN이 일치하지 않아요.'); return; }
    if (!/^\d{4,6}$/.test(n1)) { setErr('새 PIN은 숫자 4~6자리예요.'); return; }
    if (n1 !== n2) { setErr('새 PIN 확인이 달라요.'); return; }
    setSaving(true);
    await db.collection('students').doc(student.id).update({ pin:n1, pinChanged:true, updatedAt:FieldValue.serverTimestamp() });
    setSaving(false); onClose();
  };
  return (
    <Modal onClose={onClose} title="🔐 PIN 변경">
      <div className="space-y-2">
        <Field label="지금 PIN"><input className="input" type="password" value={cur} onChange={e=>setCur(e.target.value)}/></Field>
        <Field label="새 PIN (숫자 4~6자리)"><input className="input" type="password" value={n1} onChange={e=>setN1(e.target.value)}/></Field>
        <Field label="새 PIN 확인"><input className="input" type="password" value={n2} onChange={e=>setN2(e.target.value)}/></Field>
        {err && <p className="text-sm text-rose-600">{err}</p>}
        <button onClick={submit} disabled={saving} className="w-full bg-pink-400 disabled:bg-slate-300 text-white font-bold py-3 rounded-2xl mt-2">
          {saving?'저장 중…':'PIN 바꾸기'}
        </button>
      </div>
    </Modal>
  );
}

/* === 학생 목표 === */
function StudentGoals({ student, studentDoc }) {
  const emptyGoal = { text:'', dataType:'', unit:'', customUnit:'', targetValue:0, trendDirection: 'up' };
  const initFrom = (src) => {
    const o = {};
    AREAS.forEach(a => { o[a.key] = { ...emptyGoal, ...normalizeGoal(src?.[a.key]) }; });
    return o;
  };
  const baseSource = studentDoc?.pendingGoals || studentDoc?.goals;
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(initFrom(baseSource));
  const [saving, setSaving] = useState(false);

  useEffect(()=>{ setDraft(initFrom(baseSource)); /* eslint-disable-next-line */ },
    [JSON.stringify(studentDoc?.goals), JSON.stringify(studentDoc?.pendingGoals)]);

  const hasPending = !!studentDoc?.pendingGoals;
  const hasApproved = isAllGoalsComplete(studentDoc?.goals);
  const isFirstSubmission = !hasApproved;

  const setAreaField = (areaKey, patch) => setDraft(d => ({ ...d, [areaKey]: { ...d[areaKey], ...patch } }));

  const submit = async () => {
    for (const a of AREAS) {
      const g = draft[a.key];
      if (!g.text.trim()) { alert(`${a.label} 목표 내용을 적어 주세요.`); return; }
      if (!g.dataType)    { alert(`${a.label} 데이터 유형을 골라 주세요.`); return; }
      if (!g.unit)        { alert(`${a.label} 단위를 골라 주세요.`); return; }
      if (g.unit === CUSTOM_UNIT && !g.customUnit.trim()) { alert(`${a.label} 직접 입력 단위를 적어 주세요.`); return; }
      if (g.dataType === 'frequency' && (!g.targetValue || g.targetValue<=0)) { alert(`${a.label} 매일매일 좋은 습관 목표는 수치가 1 이상이어야 해요.`); return; }
    }
    setSaving(true);
    const cleaned = {};
    AREAS.forEach(a => {
      const g = draft[a.key];
      cleaned[a.key] = {
        text: g.text.trim(), dataType: g.dataType, unit: g.unit,
        customUnit: g.unit === CUSTOM_UNIT ? g.customUnit.trim() : '',
        targetValue: Number(g.targetValue) || 0,
        trendDirection: g.trendDirection || 'up'
      };
    });
    if (isFirstSubmission) {
      await db.collection('students').doc(student.id).update({
        goals: cleaned, pendingGoals: null, pendingGoalsAt: null, updatedAt: FieldValue.serverTimestamp()
      });
    } else {
      await db.collection('students').doc(student.id).update({
        pendingGoals: cleaned, pendingGoalsAt: FieldValue.serverTimestamp(), updatedAt: FieldValue.serverTimestamp()
      });
    }
    setSaving(false); setEditing(false);
  };
  const cancelPending = async () => {
    if (!confirm('수정 요청을 취소할까요?')) return;
    await db.collection('students').doc(student.id).update({ pendingGoals: null, pendingGoalsAt: null, updatedAt: FieldValue.serverTimestamp() });
  };
  if (!studentDoc) return <Loading/>;

  return (
    <section className="space-y-4">
      <Card>
        <div className="flex items-center gap-3">
          <div className="text-4xl">🎯</div>
          <div>
            <h2 className="text-lg font-bold text-slate-800">올해 나의 명인 목표</h2>
            <p className="text-xs text-slate-500 mt-0.5">{isFirstSubmission ? '첫 목표는 바로 등록돼요!' : '목표 수정은 선생님 승인 후 반영돼요.'}</p>
          </div>
        </div>
      </Card>
      {hasPending && !editing && (
        <div className="rounded-2xl border-2 border-amber-200 bg-amber-50 p-4">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-2xl">⏳</span>
              <div>
                <div className="text-sm font-bold text-amber-800">선생님 승인 대기 중</div>
                <div className="text-[11px] text-amber-700 mt-0.5">요청 {fmtDateTime(studentDoc.pendingGoalsAt)}</div>
              </div>
            </div>
            <button onClick={cancelPending} className="text-[11px] px-2 py-1 rounded-full bg-white border border-amber-300 text-amber-700 font-bold">요청 취소</button>
          </div>
          <div className="mt-3 space-y-2">
            {AREAS.map(a=>{
              const p = normalizeGoal(studentDoc.pendingGoals[a.key]);
              return (
                <div key={a.key} className="text-xs">
                  <span className={`font-bold ${a.text}`}>{a.emoji} {a.label}:</span>{' '}
                  <span className="text-slate-700">{p.text}</span>
                  <span className="ml-1 text-[10px] text-slate-500">[{findDataType(p.dataType)?.label||'-'} · 목표 {p.targetValue||'-'}{goalUnitLabel(p)||''}]</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {AREAS.map(a=>{
        const cur = normalizeGoal(studentDoc.goals?.[a.key]);
        const d = draft[a.key];
        const dt = findDataType(d.dataType);
        return (
          <div key={a.key} className={`rounded-3xl border-2 ${a.soft} p-4`}>
            <div className="flex items-center gap-2">
              <span className="text-2xl">{a.emoji}</span>
              <div>
                <div className="text-sm font-bold">{a.label}</div>
                <div className="text-[11px] opacity-70">{a.desc}</div>
              </div>
            </div>
            {editing ? (
              <div className="mt-3 space-y-3 bg-white/70 rounded-2xl p-3 border border-white">
                <Field label="목표 한 줄 설명">
                  <input className="input" placeholder="예) 매일 책 10쪽 읽기"
                    value={d.text} onChange={e=>setAreaField(a.key, { text: e.target.value })}/>
                </Field>
                <Field label="데이터 유형 (그래프 종류가 달라져요)">
                  <div className="grid grid-cols-2 gap-1.5">
                    {DATA_TYPES.map(t=>{
                      const sel = d.dataType===t.key;
                      return (
                        <button key={t.key} type="button" onClick={()=>setAreaField(a.key, { dataType: t.key })}
                          className={`text-left p-2 rounded-xl border-2 transition ${
                            sel ? 'border-pink-400 bg-pink-50' : 'border-slate-200 bg-white hover:border-pink-200'
                          }`}>
                          <div className="text-[12px] font-bold text-slate-800 leading-tight">{t.emoji} {t.label}</div>
                          <div className="text-[10px] text-slate-500 mt-1 leading-snug">{t.desc}</div>
                        </button>
                      );
                    })}
                  </div>
                  {dt && (
                    <div className="mt-2 rounded-xl bg-white border border-pink-200 p-2.5">
                      <div className="text-[11px] font-bold text-pink-700 mb-1.5">📋 이번 주 목표 예시</div>
                      <ul className="text-[11px] text-slate-700 space-y-1 leading-snug">
                        {dt.examples.map((ex,i)=>(
                          <li key={i} className="flex gap-1.5">
                            <span className="text-pink-400 shrink-0">·</span>
                            <span>{ex}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}

                  {d.dataType === 'record' && (
                    <div className="mt-2 rounded-xl bg-white border-2 border-pink-200 p-2.5">
                      <div className="text-[11px] font-bold text-pink-700 mb-2">📊 어떤 기록이 더 좋은 건가요?</div>
                      <div className="grid grid-cols-1 gap-1.5">
                        {[
                          { key:'down', emoji:'📉', title:'숫자가 작아질수록 좋아요!', desc:'예: 50m 달리기 시간 단축' },
                          { key:'up',   emoji:'📈', title:'숫자가 커질수록 좋아요!',   desc:'예: 매달리기 시간, 줄넘기 횟수 늘리기' },
                        ].map(opt=>{
                          const sel = (d.trendDirection || 'up') === opt.key;
                          return (
                            <button key={opt.key} type="button"
                              onClick={()=>setAreaField(a.key, { trendDirection: opt.key })}
                              className={`flex items-center gap-2 p-2 rounded-lg border-2 text-left transition ${
                                sel ? 'border-pink-400 bg-pink-50' : 'border-slate-200 bg-white hover:border-pink-200'
                              }`}>
                              <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${
                                sel ? 'border-pink-500' : 'border-slate-300'
                              }`}>
                                {sel && <div className="w-2.5 h-2.5 rounded-full bg-pink-500"/>}
                              </div>
                              <div className="text-lg">{opt.emoji}</div>
                              <div className="flex-1 min-w-0">
                                <div className="text-[12px] font-bold text-slate-800 leading-tight">{opt.title}</div>
                                <div className="text-[10px] text-slate-500 mt-0.5">{opt.desc}</div>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </Field>

                <div className="grid grid-cols-2 gap-2 items-end">
                  <Field label="단위 선택">
                    <UnitSelect value={d.unit} customValue={d.customUnit}
                      onChange={v=>setAreaField(a.key, { unit: v })}
                      onCustomChange={v=>setAreaField(a.key, { customUnit: v })}/>
                  </Field>
                  <Field label={d.dataType==='frequency'?'이번 주 목표 (필수)':'이번 주 목표 (선택)'}>
                    <NumberStepper compact
                      value={d.targetValue} onChange={v=>setAreaField(a.key, { targetValue: v })}
                      unit={goalUnitLabel(d)} color={a.text} min={0} max={9999} step={1}/>
                  </Field>
                </div>
              </div>
            ) : (
              <div className="mt-3">
                <p className="text-sm font-medium text-slate-900 min-h-[20px]">
                  {cur.text || <span className="text-slate-400">아직 목표를 정하지 않았어요.</span>}
                </p>
                {cur.text && (
                  <div className="mt-2 flex flex-wrap gap-1.5 text-[11px]">
                    {cur.dataType && <span className="px-2 py-0.5 rounded-full bg-white border border-slate-200 text-slate-700">{findDataType(cur.dataType)?.emoji} {findDataType(cur.dataType)?.label}</span>}
                    {cur.dataType === 'record' && (
                      <span className="px-2 py-0.5 rounded-full bg-white border border-slate-200 text-slate-700">
                        {cur.trendDirection === 'down' ? '📉 작아질수록 좋음' : '📈 커질수록 좋음'}
                      </span>
                    )}
                    {goalUnitLabel(cur) && <span className="px-2 py-0.5 rounded-full bg-white border border-slate-200 text-slate-700">단위: <b>{goalUnitLabel(cur)}</b></span>}
                    {cur.targetValue>0 && <span className="px-2 py-0.5 rounded-full bg-white border border-slate-200 text-slate-700">이번 주 목표: <b>{cur.targetValue}{goalUnitLabel(cur)}</b></span>}
                  </div>
                )}

              </div>
            )}
          </div>
        );
      })}

      {editing
        ? <div className="flex gap-2">
            <button onClick={()=>{setEditing(false);setDraft(initFrom(baseSource));}}
              className="flex-1 py-3 rounded-2xl border-2 border-slate-200 text-slate-600 font-bold">취소</button>
            <button onClick={submit} disabled={saving}
              className="flex-1 py-3 rounded-2xl bg-pink-400 text-white font-bold disabled:bg-slate-300">
              {saving?'저장 중…':(isFirstSubmission?'💾 목표 저장':'📨 수정 요청 보내기')}
            </button>
          </div>
        : <button onClick={()=>setEditing(true)} disabled={hasPending}
            className={`w-full py-3 rounded-2xl font-bold shadow-sm ${
              hasPending ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                         : 'bg-gradient-to-r from-pink-400 to-rose-400 text-white'
            }`}>
            {hasPending ? '승인 대기 중에는 수정할 수 없어요'
                        : (isFirstSubmission?'🌱 목표 처음 등록하기':'✏️ 목표 수정 요청')}
          </button>}
    </section>
  );
}

/* === 학생 일지 === */
function StudentJournal({ student, studentDoc, journals, settings, disabled }) {
  const [area, setArea] = useState('intellect');
  const [activityDateStr, setActivityDateStr] = useState(toDateInputValue(new Date()));
  const [value, setValue] = useState(0);
  const [content, setContent] = useState('');
  const [editing, setEditing] = useState(false);
  const [saving, setSaving] = useState(false);

  const allowPast = settings?.allowPastJournalEntries === true;
  const portfolioUrl = (settings?.portfolioSubmitUrl || '').trim();

  const week = useMemo(()=>getThisWeekRange(new Date()), []);
  const todayValue = toDateInputValue(new Date());
  const minWeekDate = toDateInputValue(week.start);
  const maxWeekDate = toDateInputValue(week.end);
  const inWeek  = activityDateStr >= minWeekDate && activityDateStr <= maxWeekDate;
  const isFuture = activityDateStr > todayValue;

  const canEdit = allowPast ? !isFuture : (inWeek && !isFuture);

  const existing = useMemo(() => {
    return journals.find(j => {
      if (j.area !== area) return false;
      const d = getActivityDate(j);
      return d && toDateInputValue(d) === activityDateStr;
    });
  }, [journals, area, activityDateStr]);
  useEffect(() => {
    if (existing) {
      setContent(existing.content || '');
      setValue(Number(existing.value) || 0);
      setEditing(false);
    } else {
      setContent(''); setValue(0); setEditing(false);
    }
  }, [existing?.id, area, activityDateStr]);

  const currentArea = AREAS.find(a=>a.key===area);
  const goal = normalizeGoal(studentDoc?.goals?.[area]);
  const goalUnit = goalUnitLabel(goal);
  const dt = findDataType(goal.dataType);

  const valid = value > 0 || content.trim().length >= 1;

  const save = async () => {
    if (!canEdit) {
      if (isFuture) alert('아직 오지 않은 날에는 일지를 쓸 수 없어요. 오늘이나 지난 날만 기록할 수 있어요!');
      else          alert('이번 주 안의 날짜만 저장할 수 있어요!');
      return;
    }
    if (!valid) { alert('수치를 입력하거나 소감을 한 글자라도 적어 주세요.'); return; }
    setSaving(true);
    try {
      const activityDate = parseDateInputValue(activityDateStr);
      if (existing) {
        await db.collection('journals').doc(existing.id).update({
          content: content.trim(), value: Number(value)||0, unit: goalUnit,
          dataType: goal.dataType, updatedAt: FieldValue.serverTimestamp()
        });
        alert('일지를 수정했어요! ✏️');
      } else {
        const dup = journals.find(j => j.area===area && toDateInputValue(getActivityDate(j)||new Date(0)) === activityDateStr);
        if (dup) { alert('이미 이 날짜·영역의 일지가 있어요.'); setSaving(false); return; }
        await db.collection('journals').add({
          studentId: student.id, studentName: student.name, studentAvatar: student.avatar||'',
          number: student.number, area,
          content: content.trim(),
          value: Number(value)||0,
          unit: goalUnit,
          dataType: goal.dataType,
          activityDate: Timestamp.fromDate(activityDate),
          weekday: activityDate.getDay(),
          createdAt: FieldValue.serverTimestamp(), feedback:'', feedbackAt:null
        });
        alert('일지를 저장했어요! 🌟');
      }
      setEditing(false);
    } catch(e){ console.error(e); alert('저장 실패'); }
    finally{ setSaving(false); }
  };

  const weekDays = useMemo(()=>{
    const days = [];
    for (let i=0; i<7; i++) { const d = new Date(week.start); d.setDate(week.start.getDate()+i); days.push(d); }
    return days;
  }, [week.start]);
  const writtenAreasToday = useMemo(()=>{
    const set = new Set();
    journals.forEach(j=>{ const d = getActivityDate(j); if (d && toDateInputValue(d) === activityDateStr) set.add(j.area); });
    return set;
  }, [journals, activityDateStr]);

  return (
    <section className="space-y-4">
      <Card>
        <div className="flex items-center gap-3">
          <div className="text-4xl">📝</div>
          <div>
            <h2 className="text-lg font-bold text-slate-800">나의 명인 일지장</h2>
            <p className="text-xs text-slate-500 mt-0.5">
              {allowPast
                ? '✨ 선생님이 과거 일지 작성을 허용했어요. 오늘과 모든 지난 날짜에 작성·수정할 수 있어요.'
                : '오늘과 이번 주(일~토)만 작성·수정 가능 (미래는 잠겨 있어요)'}
            </p>
          </div>
        </div>
      </Card>
      <fieldset disabled={disabled} className={`space-y-3 ${disabled?'opacity-50':''}`}>
        <div className="grid grid-cols-3 gap-2">
          {AREAS.map(a=>{
            const done = writtenAreasToday.has(a.key);
            return (
              <button key={a.key} type="button" onClick={()=>setArea(a.key)}
                className={`relative py-3 rounded-2xl border-2 text-sm font-bold transition ${
                  area===a.key ? `${a.bg} ${a.text} border-transparent scale-105` : 'bg-white text-slate-500 border-slate-100'
                }`}>
                <div className="text-2xl">{a.emoji}</div>
                <div className="mt-0.5">{a.label}</div>
                {done && <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-emerald-400"/>}
              </button>
            );
          })}
        </div>

        <div className="rounded-3xl border-2 border-pink-100 bg-white p-4">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-bold text-slate-700">📅 어느 날의 일지인가요?</div>
            <div className={`text-[11px] font-bold ${
              canEdit ? 'text-emerald-600' : isFuture ? 'text-rose-500' : 'text-slate-400'
            }`}>
              {canEdit
                ? '✏️ 작성·수정 가능'
                : isFuture
                  ? '⏳ 아직 오지 않은 날'
                  : '🔒 읽기 전용 (지난 주)'}
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-2">
            {weekDays.map(d=>{
              const vs = toDateInputValue(d);
              const isToday = vs === todayValue;
              const sel = vs === activityDateStr;
              const wd = WEEKDAY_LABEL[d.getDay()];
              const futureCell = vs > todayValue;
              const isSun = d.getDay() === 0;
              const isSat = d.getDay() === 6;
              return (
                <button key={vs} type="button" onClick={()=>setActivityDateStr(vs)}
                  className={`py-2 rounded-xl text-xs font-bold border-2 transition relative ${
                    sel ? `${currentArea.bg} ${currentArea.text} border-transparent`
                        : `bg-white ${isSun?'text-rose-500':isSat?'text-sky-600':'text-slate-500'} border-pink-100 hover:border-pink-300`
                  } ${futureCell && !sel ? 'opacity-50' : ''}`}>
                  <div>{wd}</div>
                  <div className="text-[10px] opacity-80">{d.getDate()}</div>
                  {isToday && <div className="text-[9px] mt-0.5">오늘</div>}
                  {futureCell && <span className="absolute top-1 right-1 text-[9px]">🔒</span>}
                </button>
              );
            })}
          </div>
          <input
            type="date"
            className="input"
            value={activityDateStr}
            max={todayValue}
            onChange={e=>setActivityDateStr(e.target.value)}
          />
          {allowPast && (
            <p className="text-[11px] text-emerald-600 mt-2 font-bold">
              ✨ 과거 일지 작성이 허용된 상태예요. 위 달력에서 원하는 지난 날짜를 직접 골라 작성/수정할 수 있어요.
            </p>
          )}
          {isFuture && (
            <p className="text-[11px] text-rose-500 mt-2 font-bold">
              ⚠️ 미래 날짜는 클릭해서 볼 수는 있지만 저장·수정 버튼이 비활성화돼요.
            </p>
          )}
        </div>

        <div className={`rounded-2xl border-2 p-3 ${currentArea.soft}`}>
          <div className="text-[11px] font-bold flex items-center gap-1">{currentArea.emoji} {currentArea.label} 목표</div>
          <div className="text-sm font-bold text-slate-800 mt-1">{goal.text || <span className="text-slate-400">목표 미설정</span>}</div>
          {goal.text && (
            <div className="mt-1 flex gap-1 flex-wrap text-[11px] text-slate-600">
              {dt && <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200">{dt.emoji} {dt.label}</span>}
              {goalUnit && <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200">단위 <b>{goalUnit}</b></span>}
              {goal.targetValue>0 && <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200">이번 주 목표 <b>{goal.targetValue}{goalUnit}</b></span>}
            </div>
          )}
        </div>

        <DiaryEntry
          area={currentArea}
          dateStr={activityDateStr}
          existing={existing}
          canEdit={canEdit}
          isFuture={isFuture}
          editing={editing}
          setEditing={setEditing}
          value={value}
          setValue={setValue}
          content={content}
          setContent={setContent}
          saving={saving}
          valid={valid}
          onSave={save}
          unit={goalUnit}
          dataType={goal.dataType}
          portfolioUrl={portfolioUrl}
        />
      </fieldset>
    </section>
  );
}

function PortfolioSubmitButton({ portfolioUrl }) {
  const has = !!portfolioUrl;
  if (has) {
    return (
      <a
        href={portfolioUrl} target="_blank" rel="noopener noreferrer"
        className="mt-2 w-full inline-flex items-center justify-center gap-2 py-2.5 rounded-2xl bg-gradient-to-r from-amber-400 to-rose-400 text-white font-bold text-sm hover:scale-[1.01] transition shadow-sm"
      >
        🏆 작품 제출하러 가기 🔗
      </a>
    );
  }
  return (
    <div className="mt-2 relative group">
      <button
        type="button" disabled
        title="선생님이 링크를 설정 중이에요!"
        className="w-full inline-flex items-center justify-center gap-2 py-2.5 rounded-2xl bg-slate-200 text-slate-400 font-bold text-sm cursor-not-allowed"
      >
        🏆 작품 제출하러 가기 🔗
      </button>
      <p className="text-[11px] text-slate-400 text-center mt-1">선생님이 링크를 설정 중이에요!</p>
    </div>
  );
}

function DiaryEntry({ area, dateStr, existing, canEdit, isFuture, editing, setEditing, value, setValue, content, setContent, saving, valid, onSave, unit, dataType, portfolioUrl }) {
  const dateDisplay = (() => {
    const d = parseDateInputValue(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${WEEKDAY_LABEL[d.getDay()]})`;
  })();
  const dtLabel = findDataType(dataType)?.label || '';
  const showPortfolio = dataType === 'collection';

  if (existing && !editing) {
    return (
      <div className={`rounded-3xl border-2 ${area.soft} p-5`}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-2xl">{area.emoji}</span>
            <div>
              <div className="text-xs font-bold">{area.label} 일지</div>
              <div className="text-[11px] opacity-70">{dateDisplay}</div>
            </div>
          </div>
          {canEdit && (
            <button onClick={()=>setEditing(true)} className={`text-xs px-3 py-1.5 rounded-full bg-white border-2 ${area.text} border-current font-bold`}>✏️ 수정</button>
          )}
        </div>

        <div className={`mt-4 rounded-2xl bg-white border-2 ${area.cardBorder} p-4 flex items-center justify-between`}>
          <div className="text-[11px] text-slate-500">오늘의 측정값</div>
          <div className="text-3xl font-extrabold text-slate-900 tabular-nums">
            {Number(existing.value)||0}<span className={`text-base ml-1 font-bold ${area.text}`}>{existing.unit||unit||''}</span>
          </div>
        </div>

        {existing.content && (
          <div className="mt-3 rounded-2xl bg-white p-3 diary-paper">
            <div className="text-[11px] text-slate-500 font-bold mb-1">📝 한 줄 소감</div>
            <p className="text-sm text-slate-800 whitespace-pre-wrap leading-7">{existing.content}</p>
          </div>
        )}

        {showPortfolio && <PortfolioSubmitButton portfolioUrl={portfolioUrl}/>}

        {existing.feedback && (
          <div className="mt-3 rounded-2xl bg-pink-50 border border-pink-100 p-3">
            <div className="text-[11px] text-pink-700 font-bold">💌 선생님의 응원</div>
            <p className="text-sm text-slate-800 whitespace-pre-wrap mt-1">{existing.feedback}</p>
          </div>
        )}
        {!canEdit && <p className="mt-3 text-[11px] text-slate-400 text-center">🔒 지난 주의 일지는 수정할 수 없어요.</p>}
      </div>
    );
  }
  if (!existing && !canEdit) {
    if (isFuture) {
      return (
        <div className={`rounded-3xl border-2 ${area.soft} p-8 text-center`}>
          <div className="text-4xl mb-2">⏳</div>
          <p className="text-sm font-bold text-slate-700">{dateDisplay}</p>
          <p className="text-xs text-slate-500 mt-1">아직 오지 않은 날이에요.</p>
          <p className="text-[11px] text-rose-500 mt-2 font-bold">🔒 미래 날짜는 미리 작성할 수 없어요.<br/>그날이 되면 작성할 수 있어요!</p>
        </div>
      );
    }
    return (
      <div className={`rounded-3xl border-2 ${area.soft} p-8 text-center`}>
        <div className="text-4xl mb-2">📭</div>
        <p className="text-sm font-bold text-slate-700">{dateDisplay}</p>
        <p className="text-xs text-slate-500 mt-1">이 날의 {area.label} 일지는 작성되지 않았어요.</p>
        <p className="text-[11px] text-slate-400 mt-2">🔒 지난 주의 날짜는 새로 작성할 수 없어요.</p>
      </div>
    );
  }

  return (
    <div className={`rounded-3xl border-2 ${area.soft} p-5`}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="text-2xl">{area.emoji}</span>
          <div>
            <div className="text-xs font-bold">{area.label} 일지 {existing ? '수정' : '작성'}</div>
            <div className="text-[11px] opacity-70">{dateDisplay}</div>
          </div>
        </div>
        {existing && editing && (
          <button onClick={()=>{ setContent(existing.content||''); setValue(Number(existing.value)||0); setEditing(false); }}
            className="text-xs px-3 py-1.5 rounded-full bg-white border-2 border-slate-300 text-slate-600 font-bold">취소</button>
        )}
      </div>

      <div className={`rounded-2xl bg-white border-2 ${area.cardBorder} p-3`}>
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-bold text-slate-700">🎯 목표 도달 정도 체크</div>
          {dtLabel && <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${area.bg} ${area.text} font-bold`}>{dtLabel}</span>}
        </div>
        <NumberStepper value={value} onChange={setValue} unit={unit} color={area.text} min={0} max={99999} step={1}/>
        <div className="text-[11px] text-slate-500 mt-1.5">
          {dataType==='cumulative' && '※ 입력한 값이 이번 주 누적합에 더해져요.'}
          {dataType==='record'     && '※ 오늘 측정한 수치를 그대로 적어 주세요.'}
          {dataType==='collection' && '※ 오늘 완성한 결과물의 개수를 적어 주세요.'}
          {dataType==='frequency'  && '※ 오늘 수행한 횟수를 적으면 자동으로 달성률(%)이 계산돼요.'}
        </div>
      </div>

      <div className="mt-3">
        <div className="text-xs font-bold text-slate-700 mb-1">📝 한 줄 소감 (선택)</div>
        <textarea rows="2" maxLength={120}
          className="w-full rounded-2xl border-2 border-pink-200 p-2.5 text-sm bg-white leading-6 focus:outline-none focus:ring-2 focus:ring-pink-300"
          placeholder="활동 내용이나 수치 변화에 대한 느낌을 한두 줄로 적어 주세요."
          value={content} onChange={e=>setContent(e.target.value)}/>
        <div className="text-right text-[11px] text-slate-400 mt-0.5">{content.length} / 120자</div>

        {showPortfolio && <PortfolioSubmitButton portfolioUrl={portfolioUrl}/>}

function PortfolioLinkSetting({ settings }) {
  const [url, setUrl] = useState('');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');
  useEffect(()=>{ setUrl(settings?.portfolioSubmitUrl || ''); }, [settings?.portfolioSubmitUrl]);
  const isValidUrl = (s) => {
    if (!s) return true;
    try { const u = new URL(s); return u.protocol === 'http:' || u.protocol === 'https:'; }
    catch { return false; }
  };
  const save = async () => {
    const trimmed = url.trim();
    if (!isValidUrl(trimmed)) { alert('http(s)://로 시작하는 올바른 URL을 입력해 주세요.'); return; }
    setSaving(true); setMsg('');
    await db.collection('settings').doc(CLASS_KEY).update({
      portfolioSubmitUrl: trimmed, updatedAt: FieldValue.serverTimestamp()
    });
    setSaving(false);
    setMsg(trimmed ? '✓ 링크가 저장되었어요. 학생 화면에 즉시 반영됩니다.' : '✓ 링크가 비워졌어요. 학생 버튼이 비활성화됩니다.');
    setTimeout(()=>setMsg(''), 2500);
  };
  const clear = async () => {
    if (!url) return;
    if (!confirm('현재 저장된 링크를 비울까요?')) return;
    setUrl('');
    await db.collection('settings').doc(CLASS_KEY).update({
      portfolioSubmitUrl: '', updatedAt: FieldValue.serverTimestamp()
    });
    setMsg('✓ 링크가 비워졌어요.');
    setTimeout(()=>setMsg(''), 2000);
  };
  return (
    <Card
      title="🔗 작품(포트폴리오) 제출용 공용 링크"
      desc='학생이 "멋진 작품 완성하기!" 유형 목표의 일지를 쓸 때 표시될 외부 링크예요. (예: 패들렛, 구글 드라이브 공유 폴더 등)'>

        <input
          type="url"
          inputMode="url"
          className="input flex-1 min-w-[240px]"
          placeholder="https://padlet.com/... 또는 https://drive.google.com/..."
          value={url}
          onChange={e=>setUrl(e.target.value)}
        />
        <button
          onClick={save} disabled={saving}
          className="px-4 rounded-2xl bg-pink-400 hover:bg-pink-500 disabled:bg-slate-300 text-white text-sm font-bold whitespace-nowrap">
          {saving?'저장 중…':'💾 링크 저장'}
        </button>
        {settings?.portfolioSubmitUrl && (
          <button
            onClick={clear}
            className="px-3 rounded-2xl border-2 border-rose-200 text-rose-600 hover:bg-rose-50 text-xs font-bold whitespace-nowrap">
            비우기
          </button>
        )}
      </div>
      <div className="mt-2 flex items-center justify-between gap-2 flex-wrap">
        <div className="text-[11px] text-slate-500">
          {settings?.portfolioSubmitUrl
            ? <>현재 학생에게 노출 중: <a href={settings.portfolioSubmitUrl} target="_blank" rel="noopener noreferrer" className="text-pink-600 underline break-all">{settings.portfolioSubmitUrl}</a></>

function TeacherGoalEditor({ student, onClose }) {
  const empty = { text:'', dataType:'', unit:'', customUnit:'', targetValue:0, trendDirection: 'up' };
  const initG = (src) => {
    const o = {};
    AREAS.forEach(a => { o[a.key] = { ...empty, ...normalizeGoal(src?.[a.key]) }; });
    return o;
  };
  const [g, setG] = useState(initG(student.goals));
  const [saving, setSaving] = useState(false);
  const [clearPending, setClearPending] = useState(true);
  const set = (k, patch) => setG(p => ({ ...p, [k]: { ...p[k], ...patch } }));
  const save = async () => {
    setSaving(true);
    const out = {};
    AREAS.forEach(a=>{
      const x = g[a.key];
      out[a.key] = {
        text: x.text.trim(), dataType: x.dataType, unit: x.unit,
        customUnit: x.unit===CUSTOM_UNIT ? x.customUnit.trim() : '',
        targetValue: Number(x.targetValue)||0,
        trendDirection: x.trendDirection || 'up'
      };
    });
    const update = { goals: out, updatedAt: FieldValue.serverTimestamp() };
    if (clearPending) { update.pendingGoals = null; update.pendingGoalsAt = null; }
    await db.collection('students').doc(student.id).update(update);
    setSaving(false); onClose();
  };
  return (

  const [dateRange, setDateRange] = useState(getDefaultDateRange);

  useEffect(()=>{ setEditedFeedbacks({}); }, [student.id]);
  const setFeedback = (id, text) => setEditedFeedbacks(prev => ({ ...prev, [id]: text }));
  const clearFeedbackEdit = (id) => setEditedFeedbacks(prev => { const n = {...prev}; delete n[id]; return n; });
  const dirtyEntries = useMemo(()=>{
    const out = [];
    for (const id in editedFeedbacks) {
      const j = journals.find(x=>x.id===id) || allStudentJournals.find(x=>x.id===id);
      if (!j) continue;
      const next = (editedFeedbacks[id] ?? '').trim();
      const prev = (j.feedback || '').trim();
      if (next !== prev) out.push({ id, text: next });
    }
    return out;
  }, [editedFeedbacks, journals, allStudentJournals]);
  const dirtyCount = dirtyEntries.length;
  const bulkSave = async () => {
    if (dirtyCount === 0) return;
    setBulkSaving(true);
    try {
      const batch = db.batch();
      const now = FieldValue.serverTimestamp();
      dirtyEntries.forEach(({id, text})=>{
        batch.update(db.collection('journals').doc(id), { feedback: text, feedbackAt: now });
      });
      await batch.commit();
      setEditedFeedbacks({});
      setBulkSavedMsg(`✓ ${dirtyCount}건 일괄 저장 완료`);
      setTimeout(()=>setBulkSavedMsg(''), 2000);
    } catch(e) { console.error(e); alert('일괄 저장에 실패했어요.'); }

    if (dirtyCount === 0) return;

          {AREAS.map(a=>{

            return (
              <button key={a.key} onClick={()=>onFilterArea(filterArea===a.key?'all':a.key)}
                className={`rounded-2xl ${a.bg} p-3 text-left transition border-2 ${filterArea===a.key?'border-slate-800':'border-transparent hover:scale-[1.02]'}`}>
                <div className="flex items-center justify-between">
                  <span className="text-xl">{a.emoji}</span>
                  <span className="text-xl font-extrabold text-slate-800 tabular-nums">{stats[a.key]||0}</span>
                </div>
                <div className={`text-[11px] font-bold ${a.text} mt-1`}>{a.label}</div>

        title="📈 활동량 추이"

/* ====== 동적 차트 컴포넌트 ====== */
function DynamicGoalChart({ journals, filterArea, dataType, unit, target, trendDirection, startDate, endDate }) {
  const start = useMemo(()=>{ const d=new Date(startDate); d.setHours(0,0,0,0); return d; }, [startDate]);
  const end   = useMemo(()=>{ const d=new Date(endDate);   d.setHours(23,59,59,999); return d; }, [endDate]);
  const rangeFiltered = useMemo(()=>{
    return journals.filter(j=>{
      const d = getActivityDate(j); if (!d) return false;
      return d >= start && d <= end;
    });
  }, [journals, start, end]);

  if (filterArea === 'all' || !dataType) {
    return <ActivityCountChart journals={rangeFiltered} startDate={start} endDate={end}/>;
  }
  const filtered = rangeFiltered.filter(j => j.area === filterArea);
  switch (dataType) {
    case 'record':     return <RecordLineChart    journals={filtered} area={filterArea} unit={unit} trendDirection={trendDirection} startDate={start} endDate={end}/>;
    case 'cumulative': return <CumulativeAreaChart journals={filtered} area={filterArea} unit={unit} startDate={start} endDate={end}/>;
    case 'collection': return <CollectionStepChart journals={filtered} area={filterArea} unit={unit} startDate={start} endDate={end}/>;
    case 'frequency':  return <FrequencyGauge      journals={journals} area={filterArea} unit={unit} target={target}/>;
    default: return <ActivityCountChart journals={rangeFiltered} startDate={start} endDate={end}/>;
  }
}

function makeXTickCallback(dates, days) {
  if (days <= 35) {
    return function(val, i) {
      const d = dates[i]; if (!d) return '';
      return d.getDay()===1 ? `${d.getMonth()+1}/${d.getDate()}` : '';
    };
  } else if (days <= 90) {
    return function(val, i) {
      const d = dates[i]; if (!d) return '';
      return d.getDay()===0 ? `${d.getMonth()+1}/${d.getDate()}` : '';
    };
  } else {
    return function(val, i) {
      const d = dates[i]; if (!d) return '';
      if (d.getDay() !== 0) return '';
      const weekOfMonth = Math.ceil(d.getDate() / 7);
      return `${d.getMonth()+1}월 ${weekOfMonth}주`;
    };
  }
}

function buildSeries(journals, startDate, endDate) {
  const start = new Date(startDate); start.setHours(0,0,0,0);
  const end   = new Date(endDate);   end.setHours(0,0,0,0);
  const days  = Math.max(1, Math.round((end - start) / (1000*60*60*24)) + 1);
  const labels=[], keys=[], dates=[];
  for (let i=0; i<days; i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    keys.push(`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`);
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    dates.push(d);
  }
  const values = new Array(days).fill(0);
  const counts = new Array(days).fill(0);
  journals.forEach(j=>{
    const dt = getActivityDate(j); if (!dt) return;
    const d = new Date(dt); d.setHours(0,0,0,0);
    const k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const idx = keys.indexOf(k);
    if (idx<0) return;
    values[idx] += Number(j.value)||0;
    counts[idx] += 1;
  });
  return { labels, dates, keys, values, counts, days };
}

function RecordLineChart({ journals, area, unit, trendDirection = 'up', startDate, endDate }) {
  const canvasRef = useRef(null), chartRef = useRef(null);

  const POSITIVE = '#10b981';
  const NEUTRAL  = '#94a3b8';

  const isLower = trendDirection === 'down';
  const valuesOnly = journals.map(j => ({
    d: getActivityDate(j), v: Number(j.value)||0
  })).filter(x => x.d && x.v>0).sort((a,b)=>a.d-b.d);

  const bestMap = new Map();
  let best = null;
  valuesOnly.forEach(({d,v})=>{
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    let isBest = false;
    if (best===null)               { isBest = true; best = v; }
    else if (isLower && v < best)  { isBest = true; best = v; }
    else if (!isLower && v > best) { isBest = true; best = v; }
    bestMap.set(key, isBest);
  });

  useEffect(()=>{
    if (!canvasRef.current || !window.Chart) return;
    const a = AREAS.find(x=>x.key===area);
    const { labels, dates, keys, values, counts, days } = buildSeries(journals, startDate, endDate);
    const data = values.map((v,i)=> counts[i]>0 ? v : null);

    const segmentColor = (ctx) => {
      const p0 = ctx.p0.parsed.y;
      const p1 = ctx.p1.parsed.y;
      if (p0 == null || p1 == null) return NEUTRAL;
      if (isLower) return (p1 < p0) ? POSITIVE : NEUTRAL;
      else          return (p1 > p0) ? POSITIVE : NEUTRAL;
    };

    const pointBgColors = data.map((v,i)=> v!=null && bestMap.get(keys[i]) ? POSITIVE : a.chart);
    const pointStyles   = data.map((v,i)=> v!=null && bestMap.get(keys[i]) ? 'star'   : 'circle');
    const pointRadii    = data.map((v,i)=> v!=null && bestMap.get(keys[i]) ? 8        : (days<=60?5:3));

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(canvasRef.current, {
      type:'line',
      data:{ labels, datasets:[{
        label: isLower ? `측정값 (${unit||''}) · 작을수록 좋음 📉` : `측정값 (${unit||''}) · 클수록 좋음 📈`,
        data,
        borderColor: a.chart, backgroundColor: a.chartSoft,
        tension:0.3, fill:false, spanGaps:true,
        pointRadius: pointRadii, pointHoverRadius: 10,
        pointStyle: pointStyles,
        pointBackgroundColor: pointBgColors,
        pointBorderColor:'#fff', pointBorderWidth:1.5,
        borderWidth:3,
        segment: { borderColor: segmentColor },
      }]},
      options:{ responsive:true, maintainAspectRatio:false,
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:10}, autoSkip:true, maxTicksLimit: Math.min(12, days), callback: makeXTickCallback(dates, days)} },
          y:{
            beginAtZero: !isLower,
            reverse: isLower,
            ticks:{ font:{size:10}, callback:v=>`${v}${unit||''}` },
            grid:{ color:'#fce7f3' }
          }
        },
        plugins:{
          legend:{ position:'bottom', labels:{ font:{size:11} } },
          tooltip:{
            callbacks:{
              label: ctx => {
                const k = keys[ctx.dataIndex];
                const isBest = bestMap.get(k);
                const arrow = isLower ? '📉' : '📈';
                return `  ${ctx.parsed.y}${unit||''}` + (isBest ? `  ⭐ 최고 기록 갱신! ${arrow}` : '');
              }
            }
          }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current=null; } };
  }, [journals, area, unit, trendDirection, startDate, endDate]);

  return (
    <div>
      <div className="flex items-center justify-between text-[11px] mb-2 px-1 flex-wrap gap-1">
        <span className={`font-bold ${isLower?'text-sky-600':'text-emerald-600'}`}>
          {isLower ? '📉 숫자가 작아질수록 성장!' : '📈 숫자가 커질수록 성장!'}
        </span>
        <span className="text-slate-500">
          <span className="inline-block w-2 h-2 rounded-full mr-1" style={{background:'#10b981'}}/>좋은 변화
          <span className="inline-block w-2 h-2 rounded-full mx-1 ml-2" style={{background:'#94a3b8'}}/>그대로/후퇴
          <span className="ml-2">⭐ 최고 기록</span>
        </span>
      </div>
      <div style={{height:'260px'}} className="overflow-hidden"><canvas ref={canvasRef}/></div>
    </div>
  );
}

function FrequencyGauge({ journals, area, unit, target }) {
  const canvasRef = useRef(null), chartRef = useRef(null);
  const a = AREAS.find(x=>x.key===area);
  const week = getThisWeekRange(new Date());
  const weekly = journals.filter(j=>{
    if (j.area !== area) return false;
    const d = getActivityDate(j);
    return d && d>=week.start && d<=week.end;
  });
  const achieved = weekly.reduce((s,j)=>s+(Number(j.value)||0), 0);
  const tgt = Number(target)>0 ? Number(target) : 1;
  const pct = Math.min(100, Math.round((achieved / tgt) * 100));

function StudentAddCard({ students }) {
  const [name, setName] = useState('');
  const [number, setNumber] = useState('');
  const [bulk, setBulk] = useState('');
  const [msg, setMsg] = useState('');
  const addOne = async () => {
    if (!name.trim()||!number) { alert('이름과 번호를 모두 입력하세요.'); return; }
    const num = Number(number);
    if (students.some(s=>s.number===num)) { alert(`이미 ${num}번 학생이 있어요.`); return; }
    const id = STUDENT_ID(num);
    await db.collection('students').doc(id).set({
      id, name:name.trim(), number:num,
      pin: DEFAULT_PIN, pinChanged: false, avatar: '',
      goals: { personality:null, emotion:null, intellect:null },
      pendingGoals: null, pendingGoalsAt: null,
      lastLoginAt: null,
      createdAt: FieldValue.serverTimestamp(), updatedAt: FieldValue.serverTimestamp()
    });
    setName(''); setNumber(''); setMsg('✓ 학생 추가 완료'); setTimeout(()=>setMsg(''),1500);
  };
  const addBulk = async () => {
    const lines = bulk.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if (lines.length===0) return;
    const existing = new Set(students.map(s=>s.number));
    const batch = db.batch();
    let ok=0, skip=0;
    for (const line of lines) {
      const parts = line.split(',').map(x=>x.trim());
      if (parts.length<2) continue;
      const [nm, numStr] = parts;
      const num = Number(numStr);
      if (!nm || !Number.isInteger(num)) continue;
      if (existing.has(num)) { skip++; continue; }
      existing.add(num);
      const id = STUDENT_ID(num);
      batch.set(db.collection('students').doc(id), {
        id, name:nm, number:num, pin:DEFAULT_PIN, pinChanged:false, avatar:'',
        goals:{personality:null,emotion:null,intellect:null},
        pendingGoals: null, pendingGoalsAt: null, lastLoginAt:null,
        createdAt:FieldValue.serverTimestamp(), updatedAt:FieldValue.serverTimestamp()
      });
      ok++;
    }
    await batch.commit();
    setBulk('');
    alert(`등록 ${ok}명 / 중복 건너뜀 ${skip}명`);
  };
  return (
    <Card title="🌷 학생 추가" desc="추가 시 초기 PIN은 0000으로 자동 부여돼요.">
      <div className="flex flex-wrap gap-2 items-end">
        <div className="w-40"><Field label="이름"><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="홍길동"/></Field></div>
        <div className="w-28"><Field label="번호"><input className="input" type="number" inputMode="numeric" value={number} onChange={e=>setNumber(e.target.value)} placeholder="7"/></Field></div>
        <button onClick={addOne} className="px-4 py-2 rounded-2xl bg-pink-400 hover:bg-pink-500 text-white text-sm font-bold">+ 추가</button>
        {msg && <span className="text-xs text-emerald-600 font-bold ml-2">{msg}</span>}
      </div>
      <details className="mt-3">
        <summary className="text-xs text-slate-500 cursor-pointer">CSV 일괄 등록 (이름,번호)</summary>
        <textarea rows="5" className="mt-2 w-full rounded-2xl border border-pink-200 p-3 text-sm font-mono"
          placeholder={"홍길동,1\n김민지,2\n이서준,3"} value={bulk} onChange={e=>setBulk(e.target.value)}/>
        <div className="flex justify-end mt-2">
          <button onClick={addBulk} disabled={!bulk.trim()} className="px-4 py-2 rounded-2xl bg-slate-800 disabled:bg-slate-300 text-white text-sm font-bold">일괄 등록</button>
        </div>
      </details>
    </Card>
  );
}

/* ★★★ 신규: localStorage → Firestore 마이그레이션 카드 ★★★ */
function MigrationCard() {
  const [scan, setScan] = useState(null);     // { has, total, summary }
  const [mode, setMode] = useState('merge');   // merge | overwrite | skip
  const [working, setWorking] = useState(false);
  const [progress, setProgress] = useState(null);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [confirmTyped, setConfirmTyped] = useState('');
  const [clearAfter, setClearAfter] = useState(false);

  const rescan = () => {
    const info = window.__migration.hasLocalData();
    setScan(info);
    setResult(null); setError(''); setProgress(null);
  };
  useEffect(()=>{ rescan(); }, []);

  const run = async () => {
    if (!scan?.has) return;
    if (confirmTyped.trim() !== '이전') { alert('실행 확인을 위해 "이전" 두 글자를 입력해 주세요.'); return; }
    if (!confirm(`localStorage 데이터(총 ${scan.total}건)를 Firestore로 이전합니다. 계속할까요?\n\n모드: ${mode}`)) return;

    setWorking(true); setResult(null); setError(''); setProgress({ collection:'', done:0, total: scan.total, skipped:0 });
    try {
      const res = await window.__migration.migrate(mode, (p)=>setProgress(p));
      setResult(res);
      if (clearAfter) {
        window.__migration.clearLocal();
      }
      rescan();
    } catch(e) {
      console.error(e);
      setError(e.message || String(e));
    } finally {
      setWorking(false);
    }
  };

  return (
    <Card
      title="📦 localStorage → Firestore 데이터 이전 (마이그레이션)"
      desc="기존에 브라우저에 저장돼 있던 명인제 데이터를 Firestore로 한 번에 옮길 수 있어요. (학교·가정 어디서나 동기화)">
      {!scan?.has ? (
        <div className="rounded-2xl border-2 border-slate-200 p-4 bg-slate-50">
          <div className="text-sm text-slate-700">
            🔍 현재 브라우저의 <code className="px-1 bg-white border rounded">localStorage</code>에서 이전할 명인제 데이터를 찾지 못했어요.
          </div>
          <ul className="text-[11px] text-slate-500 mt-2 space-y-0.5 list-disc list-inside">
            <li>이전 버전 앱을 사용하던 동일한 브라우저(같은 PC·같은 도메인)에서 실행해 주세요.</li>
            <li>시크릿 모드/다른 브라우저에서는 이전할 데이터가 보이지 않을 수 있습니다.</li>
          </ul>
          <button onClick={rescan}
            className="mt-3 px-3 py-1.5 rounded-2xl border-2 border-slate-300 text-slate-700 text-xs font-bold">다시 스캔</button>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="rounded-2xl border-2 border-emerald-200 bg-emerald-50 p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm font-bold text-emerald-800">✅ 이전 가능 데이터 발견</div>
              <button onClick={rescan} className="text-[11px] px-2 py-1 rounded-full bg-white border border-emerald-300 text-emerald-700 font-bold">다시 스캔</button>
            </div>
            <div className="text-xs text-slate-700">총 <b className="text-emerald-700 tabular-nums">{scan.total}</b>건</div>
            <ul className="mt-1.5 text-[11px] text-slate-600 grid grid-cols-2 sm:grid-cols-3 gap-x-3 gap-y-0.5">
              {Object.entries(scan.summary).map(([c,n])=>(
                <li key={c}>· {c}: <b className="tabular-nums">{n}</b>건</li>
              ))}
            </ul>
          </div>

          <div className="rounded-2xl border-2 border-pink-100 p-4">
            <div className="text-xs font-bold text-slate-700 mb-2">📥 이전 방식 선택</div>
            <div className="space-y-1.5">
              {[
                { k:'merge',     emoji:'🔀', t:'병합 (권장)', d:'같은 ID가 Firestore에 이미 있으면 필드 단위로 합쳐요.' },
                { k:'overwrite', emoji:'🧨', t:'덮어쓰기',   d:'같은 ID 문서를 통째로 로컬 데이터로 교체해요.' },
                { k:'skip',      emoji:'⏭', t:'건너뛰기',   d:'같은 ID가 Firestore에 이미 있으면 그대로 두고 새 문서만 추가해요.' },
              ].map(opt=>(
                <label key={opt.k} className={`flex items-start gap-2 p-2 rounded-xl border-2 cursor-pointer transition ${
                  mode===opt.k ? 'border-pink-400 bg-pink-50' : 'border-slate-200 bg-white hover:border-pink-200'
                }`}>
                  <input type="radio" name="migmode" value={opt.k} checked={mode===opt.k}
                    onChange={()=>setMode(opt.k)} className="mt-1"/>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12px] font-bold text-slate-800">{opt.emoji} {opt.t}</div>
                    <div className="text-[11px] text-slate-500 mt-0.5">{opt.d}</div>
                  </div>
                </label>
              ))}
            </div>

            <label className="mt-3 flex items-center gap-2 text-[11px] text-slate-600">
              <input type="checkbox" checked={clearAfter} onChange={e=>setClearAfter(e.target.checked)}/>
              이전 성공 후 브라우저의 localStorage 데이터를 비우기 (선택)
            </label>

            <div className="mt-3 grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-2 items-stretch">
              <input
                className="input"
                placeholder='확인을 위해 "이전" 입력'
                value={confirmTyped}
                onChange={e=>setConfirmTyped(e.target.value)}
              />
              <button onClick={run} disabled={working || confirmTyped.trim()!=='이전'}
                className="px-4 py-2.5 rounded-2xl bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-300 text-white text-sm font-bold whitespace-nowrap">
                {working ? '이전 중…' : '🚀 Firestore로 이전 실행'}
              </button>
            </div>
          </div>

          {progress && working && (
            <div className="rounded-2xl border border-sky-200 bg-sky-50 p-3 text-[12px] text-sky-800">
              ⏳ 진행 중: 컬렉션 <b>{progress.collection || '-'}</b> · 완료 <b className="tabular-nums">{progress.done}</b>
              {progress.skipped>0 && <> · 건너뜀 <b className="tabular-nums">{progress.skipped}</b></>}
              {' / '}<b className="tabular-nums">{progress.total}</b>
            </div>
          )}

          {result && (
            <div className="rounded-2xl border-2 border-emerald-300 bg-emerald-50 p-3 text-sm text-emerald-800">
              🎉 이전 완료 — 새로 쓴 문서 <b className="tabular-nums">{result.done}</b>건
              {result.skipped>0 && <>, 건너뜀 <b className="tabular-nums">{result.skipped}</b>건</>} (감지 총 <b>{result.total}</b>건)
              <div className="text-[11px] text-emerald-700 mt-1">상단의 대시보드/학급 관리 탭에서 데이터가 잘 보이는지 확인해 주세요.</div>
            </div>
          )}

          {error && (
            <div className="rounded-2xl border-2 border-rose-300 bg-rose-50 p-3 text-sm text-rose-700">
              ❌ 실패: {error}
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

function AdminJournalPolicy({ settings }) {
  const allow = settings?.allowPastJournalEntries === true;
  const [busy, setBusy] = useState(false);
  const onToggle = async (e) => {
    const next = e.target.checked;
    setBusy(true);
    try {
      await db.collection('settings').doc(CLASS_KEY).update({
        allowPastJournalEntries: next, updatedAt: FieldValue.serverTimestamp()
      });
    } catch(err) { console.error(err); alert('설정 변경에 실패했어요.'); }
    finally { setBusy(false); }
  };
  return (
    <Card title="📅 일지 작성 정책">
      <div className="flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="text-sm font-bold text-slate-800">과거 일지 작성 허용 (미제출 과제 보완용)</div>
          <p className="text-[11px] text-slate-500 mt-1 leading-relaxed">
            활성화 시, 학생들이 이번 주 이전의 과거 날짜에도 일지를 작성하고 수정할 수 있습니다.
            <br/>(미래 날짜는 항상 차단됩니다.)
          </p>
        </div>
        <label className={`toggle-switch shrink-0 ${busy?'opacity-50 pointer-events-none':''}`}>
          <input type="checkbox" checked={allow} onChange={onToggle}/>
          <span className="toggle-slider"></span>
        </label>
      </div>
      <div className="mt-3 p-2.5 rounded-xl border border-pink-100 bg-pink-50/50 text-[11px] text-slate-600">
        현재 상태: {allow
          ? <b className="text-emerald-600">✅ ON — 학생이 모든 과거 날짜에 일지 작성 가능</b>
          : <b className="text-slate-700">⛔ OFF — 학생은 이번 주(일~토) 안에서만 작성 가능</b>}
      </div>
    </Card>
  );
}

function AdminClassInfo({ settings }) {
  const [name, setName] = useState('');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');
  useEffect(()=>{ setName(settings?.className || ''); }, [settings]);
  const save = async () => {
    if (!name.trim()) return;
    setSaving(true); setMsg('');
    await db.collection('settings').doc(CLASS_KEY).update({ className: name.trim(), updatedAt: FieldValue.serverTimestamp() });
    setSaving(false); setMsg('✓ 학급 이름이 변경되었습니다.');
    setTimeout(()=>setMsg(''), 2000);
  };
  return (
    <Card title="🏫 학급 이름">
      <div className="flex gap-2 max-w-md">
        <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="예: 3학년 2반 새싹반"/>
        <button onClick={save} disabled={saving||!name.trim()} className="px-4 rounded-2xl bg-pink-400 hover:bg-pink-500 disabled:bg-slate-300 text-white text-sm font-bold whitespace-nowrap">변경</button>
      </div>
      {msg && <p className="mt-2 text-xs text-emerald-600 font-bold">{msg}</p>}
    </Card>
  );
}
function AdminPassword({ settings }) {
  const [cur, setCur] = useState('');
  const [n1, setN1] = useState('');
  const [n2, setN2] = useState('');
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);
  const submit = async () => {
    setErr(''); setMsg('');
    if (cur !== (settings?.teacherPassword||DEFAULT_TEACHER_PW)) { setErr('현재 비밀번호가 일치하지 않습니다.'); return; }
    if (n1.length < 4) { setErr('새 비밀번호는 4자 이상이어야 합니다.'); return; }
    if (n1 !== n2) { setErr('새 비밀번호 확인이 일치하지 않습니다.'); return; }
    setSaving(true);
    await db.collection('settings').doc(CLASS_KEY).update({ teacherPassword: n1, updatedAt: FieldValue.serverTimestamp() });
    setSaving(false); setCur(''); setN1(''); setN2(''); setMsg('✓ 비밀번호가 변경되었습니다.');
    setTimeout(()=>setMsg(''), 2500);
  };
  return (
    <Card title="🔑 선생님 비밀번호 변경">
      <div className="space-y-2 max-w-md">
        <Field label="현재 비밀번호"><input className="input" type="password" value={cur} onChange={e=>setCur(e.target.value)}/></Field>
        <Field label="새 비밀번호 (4자 이상)"><input className="input" type="password" value={n1} onChange={e=>setN1(e.target.value)}/></Field>
        <Field label="새 비밀번호 확인"><input className="input" type="password" value={n2} onChange={e=>setN2(e.target.value)}/></Field>
        {err && <p className="text-sm text-rose-600">{err}</p>}
        {msg && <p className="text-sm text-emerald-600 font-bold">{msg}</p>}
        <button onClick={submit} disabled={saving} className="mt-1 px-4 py-2 rounded-2xl bg-pink-400 hover:bg-pink-500 disabled:bg-slate-300 text-white text-sm font-bold">비밀번호 변경</button>
      </div>
    </Card>
  );
}
function DangerZone({ settings, students }) {
  const [open, setOpen] = useState(false);
  const [typed, setTyped] = useState('');
  const [working, setWorking] = useState(false);
  const expected = settings?.className || '우리반';
  const doReset = async () => {
    if (typed.trim() !== expected) { alert(`학급 이름을 정확히 입력해야 합니다: "${expected}"`); return; }
    setWorking(true);
    try {
      const sSnap = await db.collection('students').get();
      const jSnap = await db.collection('journals').get();
      const all = [...sSnap.docs, ...jSnap.docs];
      for (let i=0; i<all.length; i+=400) {
        const batch = db.batch();
        all.slice(i, i+400).forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
      alert('전체 초기화가 완료되었습니다.');
      setOpen(false); setTyped('');
    } catch(e){ console.error(e); alert('초기화 실패'); }
    finally{ setWorking(false); }
  };
  return (
    <div className="bg-white border-2 border-rose-200 rounded-3xl p-5">
      <h3 className="text-sm font-bold text-rose-700">⚠️ 위험 구역 — 전체 초기화</h3>
      <p className="text-xs text-slate-600 mt-1">새 학기 세팅 시 사용합니다.</p>
      <button onClick={()=>setOpen(true)} className="mt-3 px-4 py-2 rounded-2xl bg-rose-500 hover:bg-rose-600 text-white text-sm font-bold">전체 초기화</button>
      {open && (
        <Modal onClose={()=>!working && setOpen(false)} title="정말로 모든 데이터를 삭제할까요?">
          <p className="text-sm text-slate-700">현재 <b>{expected}</b>에 등록된 학생 <b>{students.length}명</b>과 모든 일지·피드백이 삭제됩니다.</p>
          <p className="mt-3 text-xs text-slate-500">계속하려면 아래에 학급 이름을 정확히 입력하세요.</p>
          <input className="input mt-1" value={typed} onChange={e=>setTyped(e.target.value)} placeholder={expected}/>
          <div className="flex justify-end gap-2 mt-4">
            <button onClick={()=>setOpen(false)} disabled={working} className="px-3 py-2 rounded-2xl border-2 border-slate-200 text-slate-700 text-sm font-bold">취소</button>
            <button onClick={doReset} disabled={working||typed.trim()!==expected}
              className="px-3 py-2 rounded-2xl bg-rose-500 disabled:bg-slate-300 text-white text-sm font-bold">
              {working?'삭제 중…':'영구 삭제 실행'}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}
